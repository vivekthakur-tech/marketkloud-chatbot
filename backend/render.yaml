services:
  - type: web
    name: marketkloud-chatbot
    env: python
    buildCommand: pip install -r requirements.txt && python ingest.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CALENDLY_URL
        sync: false
    disk:
      name: chroma-db
      mountPath: /opt/render/project/src/backend/chroma_db
      sizeGB: 1
